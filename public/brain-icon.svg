<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110" fill="none">
  <defs>
    <linearGradient id="g" x1="10" y1="10" x2="90" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="55%" stop-color="#0f6a9a"/>
      <stop offset="100%" stop-color="#1a3460"/>
    </linearGradient>
  </defs>

  <!-- Outer brain shape -->
  <path
    d="M 32 85
       C 24 84 16 78 13 69
       C 10 61 13 53 18 48
       C 14 43 12 36 15 29
       C 18 22 25 17 33 18
       C 36 12 43 9 50 11
       C 57 9 64 12 67 18
       C 74 16 81 21 83 28
       C 86 34 84 43 80 48
       C 85 53 87 62 84 70
       C 81 78 73 84 65 85
       C 60 91 40 91 32 85 Z"
    stroke="url(#g)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"
  />

  <!-- Top gyrus bumps -->
  <path d="M 20 40 C 23 31 30 27 37 30" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>
  <path d="M 38 27 C 43 22 52 22 57 27" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>
  <path d="M 58 28 C 63 25 70 28 72 35" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>

  <!-- Left-side gyrus -->
  <path d="M 14 60 C 18 55 24 54 28 57" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Right-side gyrus -->
  <path d="M 73 60 C 77 55 82 57 83 63" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Central fissure -->
  <path d="M 50 84 C 49 72 48 58 50 42" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Medical cross — centred in left hemisphere -->
  <line x1="38" y1="46" x2="38" y2="66" stroke="url(#g)" stroke-width="5" stroke-linecap="round"/>
  <line x1="28" y1="56" x2="48" y2="56" stroke="url(#g)" stroke-width="5" stroke-linecap="round"/>

  <!-- Stem -->
  <path d="M 36 86 C 36 93 41 97 47 97 C 53 97 56 93 56 87"
    stroke="url(#g)" stroke-width="2.8" stroke-linecap="round"/>
</svg>
