       C 192  88 196 103 190 117
       C 184 132 170 140 157 142
       C 158 155 152 167 140 175
       C 128 183 112 185  98 182
       C 95  190  92 197  88 198 Z"
    stroke="url(#g)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"
  />

  <!-- ── Superior gyri bumps (top surface) ── -->
  <path d="M 44 36 C 50 24 62 18 74 22" stroke="url(#g)" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M 80 22 C 90 10 106 8 116 16" stroke="url(#g)" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M 120 12 C 133 4 150 8 158 20" stroke="url(#g)" stroke-width="4.5" stroke-linecap="round"/>

  <!-- ── Frontal lobe inner gyri ── -->
  <path d="M 36 100 C 44 90 56 88 64 95" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 40 67  C 50 60 62 60 70 68" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- ── Posterior gyri ── -->
  <path d="M 175 80 C 183 90 182 104 174 112" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 158 142 C 166 132 168 118 160 110" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- ── Temporal lobe gyri ── -->
  <path d="M 48 178 C 58 172 68 174 74 182" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 100 182 C 112 178 122 172 128 162" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- ── Central sulcus divider ── -->
  <path d="M 108 175 C 106 158 104 138 108 116 C 112 95 110 78 108 60"
    stroke="url(#g)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- ── Medical cross (large, centred in frontal lobe) ── -->
