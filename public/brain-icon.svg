       C 72 198 55 190 45 178
       C 34 165 32 148 36 135
       C 24 128 15 115 16 100
       C 17 86  26  73  40  67
       C 36  57  36  45  44  36
       C 52  27  65  23  77  27
       C 84  16  96   9 110  11
       C 124   8 138  15 145  26
       C 157  20 172  25 180  37
