  <line x1="88" y1="68" x2="88" y2="138" stroke="url(#g)" stroke-width="12" stroke-linecap="round"/>
  <!-- Horizontal bar -->
  <line x1="52" y1="103" x2="124" y2="103" stroke="url(#g)" stroke-width="12" stroke-linecap="round"/>

  <!-- ── Brainstem ── -->
  <path d="M 90 198 C 90 208 96 215 104 215 C 112 215 116 208 116 198"
    stroke="url(#g)" stroke-width="5" stroke-linecap="round"/>
</svg>
