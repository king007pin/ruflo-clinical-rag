<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230" fill="none">
  <defs>
    <linearGradient id="g" x1="30" y1="20" x2="195" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0d9488"/>
      <stop offset="45%"  stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#1a3460"/>
    </linearGradient>
  </defs>

